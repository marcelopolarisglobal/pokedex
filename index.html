<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokédex</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header__content">
      <h1 class="header__title">Pokédex</h1>
      <p class="header__subtitle">Consulte e explore o mundo Pokémon</p>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <div class="search">
        <input
          type="text"
          id="search-input"
          class="search__input"
          placeholder="Buscar por nome ou número..."
          autocomplete="off"
        >
      </div>

      <div class="filters">
        <select id="type-filter" class="filters__select">
          <option value="">Todos os tipos</option>
        </select>
        <select id="generation-filter" class="filters__select">
          <option value="">Todas as gerações</option>
        </select>
      </div>
    </section>

    <section id="pokemon-grid" class="grid" aria-live="polite"></section>

    <div id="status" class="status" hidden></div>

    <div class="load-more">
      <button id="load-more-btn" class="load-more__btn" hidden>Carregar mais</button>
    </div>
  </main>

  <div id="detail-modal" class="modal" hidden>
    <div class="modal__overlay" data-close></div>
    <div class="modal__content" role="dialog" aria-modal="true" aria-labelledby="modal-name">
      <button class="modal__close" data-close aria-label="Fechar">&times;</button>
      <div id="modal-body" class="modal__body"></div>
    </div>
  </div>

  <footer class="footer">
    <p>Dados fornecidos pela <a href="https://pokeapi.co/" target="_blank" rel="noopener">PokeAPI</a></p>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
